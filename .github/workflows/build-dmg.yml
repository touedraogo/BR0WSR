name: Build DMG

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build DMG
        run: npm run build:dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: NordVPN-Browser.dmg
          path: dist/*.dmg
