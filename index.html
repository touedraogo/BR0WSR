<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BR0WSR</title>
  <style>
    :root {
      --green:   #00ff41;
      --green2:  #00cc33;
      --green3:  #007a1f;
      --dim:     #003d0f;
      --bg:      #020a02;
      --bg2:     #040d04;
      --border:  #0a2e0a;
      --text:    #00cc33;
      --muted:   #1a4d1a;
      --glow:    0 0 6px #00ff4166, 0 0 12px #00ff4122;
      --glow-hi: 0 0 8px #00ff41aa, 0 0 20px #00ff4144;
      --mono:    'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg);
      font-family: var(--mono);
      overflow: hidden;
      color: var(--green);
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px
      );
    }

    /* ── TOOLBAR ── */
    #toolbar {
      height: 48px;
      display: flex;
      align-items: center;
      padding: 0 14px 0 82px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      -webkit-app-region: drag;
      gap: 10px;
    }

    #toolbar::before {
      content: '> ';
      color: var(--green3);
      font-size: 12px;
      -webkit-app-region: no-drag;
      pointer-events: none;
    }

    #url-bar {
      flex: 1;
      height: 30px;
      border: 1px solid var(--green3);
      background: #000;
      color: var(--green);
      font-family: var(--mono);
      font-size: 12px;
      padding: 0 10px;
      outline: none;
      -webkit-app-region: no-drag;
      caret-color: var(--green);
      letter-spacing: 0.03em;
    }
    #url-bar:focus { border-color: var(--green); box-shadow: var(--glow); }
    #url-bar::placeholder { color: var(--muted); }

    /* ── MAIN ROW ── */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
      position: relative;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: 220px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    /* unpinned: sidebar floats over content */
    #sidebar.unpinned {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      transform: translateX(-221px);
      opacity: 0;
      pointer-events: none;
    }
    #sidebar.unpinned.open {
      transform: translateX(0);
      opacity: 1;
      pointer-events: all;
    }

    /* ── SIDEBAR HEADER ── */
    #sidebar-header {
      padding: 10px 10px 6px;
      font-size: 9px;
      color: var(--green3);
      letter-spacing: 0.15em;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    /* ── PIN BUTTON ── */
    #pin-btn {
      background: none;
      border: none;
      padding: 2px;
      cursor: pointer;
      color: var(--green3);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.1s, filter 0.1s;
      flex-shrink: 0;
    }
    #pin-btn:hover { color: var(--green); filter: drop-shadow(0 0 4px #00ff4166); }
    #pin-btn.pinned { color: var(--green); filter: drop-shadow(0 0 4px #00ff4166); }
    #pin-btn #pin-icon-pinned   { display: none; }
    #pin-btn.pinned #pin-icon-unpinned { display: none; }
    #pin-btn.pinned #pin-icon-pinned   { display: block; }

    #tabs { flex: 1; overflow-y: auto; padding: 6px 0; }
    #tabs::-webkit-scrollbar { width: 3px; }
    #tabs::-webkit-scrollbar-thumb { background: var(--green3); }

    .tab {
      display: flex;
      align-items: center;
      padding: 0 10px;
      height: 34px;
      cursor: pointer;
      margin: 1px 6px;
      gap: 8px;
      border: 1px solid transparent;
      transition: all 0.1s;
    }
    .tab::before { content: '│'; color: var(--muted); font-size: 14px; flex-shrink: 0; }
    .tab:hover { border-color: var(--green3); background: var(--dim); }
    .tab.active { border-color: var(--green3); background: var(--dim); }
    .tab.active::before { color: var(--green); }
    .tab-title {
      flex: 1; font-size: 11px; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab.active .tab-title { color: var(--green); text-shadow: var(--glow); }
    .tab-close { font-size: 10px; color: var(--green3); display: none; padding: 2px 4px; }
    .tab:hover .tab-close { display: block; }
    .tab-close:hover { color: var(--green); text-shadow: var(--glow); }

    #sidebar-footer { border-top: 1px solid var(--border); padding: 6px; }
    #new-tab-btn {
      width: 100%; padding: 7px 10px;
      background: none; border: 1px dashed var(--green3);
      color: var(--green3); font-family: var(--mono); font-size: 11px;
      cursor: pointer; text-align: left; letter-spacing: 0.1em;
      transition: all 0.1s;
    }
    #new-tab-btn:hover { border-color: var(--green); color: var(--green); background: var(--dim); box-shadow: var(--glow); }

    /* ── VPN PANEL ── */
    #vpn-panel {
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #vpn-header {
      padding: 8px 10px 4px;
      font-size: 9px;
      color: var(--green3);
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #vpn-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--green3);
      flex-shrink: 0;
      transition: background 0.3s, box-shadow 0.3s;
    }
    #vpn-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
    #vpn-dot.connecting { background: #ff9900; box-shadow: 0 0 6px #ff990088; animation: blink 0.8s step-end infinite; }
    #vpn-status-text { font-size: 9px; color: var(--green3); letter-spacing: 0.1em; }
    #vpn-status-text.connected { color: var(--green); }

    #vpn-countries { padding: 4px 6px 6px; display: flex; flex-direction: column; gap: 3px; }

    .vpn-country {
      display: flex; align-items: center;
      padding: 5px 8px; gap: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.1s;
      font-size: 11px;
    }
    .vpn-country:hover { border-color: var(--green3); background: var(--dim); }
    .vpn-country.active {
      border-color: var(--green);
      background: var(--dim);
      box-shadow: var(--glow);
    }
    .vpn-flag { font-size: 14px; line-height: 1; }
    .vpn-name { flex: 1; color: var(--text); letter-spacing: 0.05em; }
    .vpn-country.active .vpn-name { color: var(--green); text-shadow: var(--glow); }
    .vpn-indicator {
      font-size: 9px; color: var(--muted);
      transition: color 0.2s;
    }
    .vpn-country.active .vpn-indicator { color: var(--green); content: '●'; }

    #vpn-disconnect-btn {
      display: none;
      width: calc(100% - 12px); margin: 0 6px 6px;
      padding: 5px; background: none;
      border: 1px solid var(--green3); color: var(--green3);
      font-family: var(--mono); font-size: 10px;
      cursor: pointer; letter-spacing: 0.1em; transition: all 0.1s;
    }
    #vpn-disconnect-btn:hover { border-color: #ff4444; color: #ff4444; }
    #vpn-disconnect-btn.visible { display: block; }

    /* ── EDGE TRIGGER STRIP ── */
    #edge-trigger {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 8px;
      z-index: 200;
      pointer-events: all;
    }
    #sidebar.unpinned.open ~ #content #edge-trigger,
    #sidebar:not(.unpinned) ~ #content #edge-trigger {
      display: none;
    }

    /* ── CONTENT AREA ── */
    #content {
      flex: 1;
      position: relative;
      background: var(--bg);
    }

    /* ── HOME SCREEN ── */
    #home {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 18px; background: var(--bg);
      z-index: 10;
    }
    #home.hidden { display: none; }

    #home-logo {
      font-size: 11px; color: var(--green3);
      letter-spacing: 0.2em; text-align: center; line-height: 1.6;
    }
    #home-logo span { color: var(--green); text-shadow: var(--glow-hi); }

    #home-prompt { display: flex; align-items: center; gap: 6px; }
    #home-prompt::before {
      content: '~/search $'; font-size: 12px;
      color: var(--green3); white-space: nowrap;
    }

    #home-input {
      width: 380px; height: 38px;
      border: 1px solid var(--green3); background: #000;
      color: var(--green); font-family: var(--mono); font-size: 13px;
      padding: 0 12px; outline: none; caret-color: var(--green);
    }
    #home-input:focus { border-color: var(--green); box-shadow: var(--glow-hi); }
    #home-input::placeholder { color: var(--muted); }

    #home-hint { font-size: 10px; color: var(--green3); letter-spacing: 0.1em; }

    /* ── WEBVIEWS ── */
    .wv-wrap {
      position: absolute; inset: 0;
      display: none;
    }
    .wv-wrap.active { display: flex; }

    webview {
      width: 100%; height: 100%;
      border: none;
    }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .blink { animation: blink 1s step-end infinite; }

    /* ── LOCK SCREEN ── */
    #lock-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 32px;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,65,0.015) 2px, rgba(0,255,65,0.015) 4px
      );
      transition: opacity 0.4s ease;
    }
    #lock-screen.hidden { opacity: 0; pointer-events: none; }

    #lock-title {
      font-size: 11px; color: var(--green3);
      letter-spacing: 0.25em; text-align: center; line-height: 2.2;
    }
    #lock-title span { color: var(--green); text-shadow: var(--glow-hi); font-size: 20px; letter-spacing: 0.35em; }

    /* fingerprint SVG container */
    #fp-container {
      position: relative;
      width: 150px; height: 150px;
      cursor: pointer;
      overflow: hidden;
    }
    #fp-svg { width: 100%; height: 100%; }

    #fp-ridges {
      fill: var(--green3);
      transition: fill 0.5s, filter 0.5s;
    }
    #fp-container.scanning #fp-ridges {
      fill: var(--green);
      filter: drop-shadow(0 0 4px #00ff4199);
    }
    #fp-container.success #fp-ridges {
      fill: var(--green);
      filter: drop-shadow(0 0 8px #00ff41cc);
    }
    #fp-container.error #fp-ridges {
      fill: #ff4444;
      filter: drop-shadow(0 0 5px #ff444499);
    }

    /* scan line */
    #scan-line-div {
      position: absolute;
      left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 5%, var(--green) 40%, #00ff41ff 50%, var(--green) 60%, transparent 95%);
      box-shadow: 0 0 10px var(--green), 0 0 24px #00ff4166, 0 2px 8px #00ff4133;
      top: 0; opacity: 0;
      pointer-events: none;
    }
    #fp-container.scanning #scan-line-div {
      animation: fp-scan 1.5s ease-in-out infinite;
    }

    #lock-status {
      font-size: 10px; letter-spacing: 0.18em;
      color: var(--green3); min-height: 16px; text-align: center;
    }
    #lock-status.error { color: #ff4444; }
    #lock-status.ok    { color: var(--green); text-shadow: var(--glow); }

    @keyframes fp-scan {
      0%   { top: 0%;   opacity: 0; }
      4%   { opacity: 1; }
      96%  { opacity: 1; }
      100% { top: 100%; opacity: 0; }
    }
  </style>
</head>
<body>

<!-- ── LOCK SCREEN ── -->
<div id="lock-screen">
  <div id="lock-title">
    <span>BR0WSR</span><br/>
    ─────────────────────<br/>
    authentication required
  </div>

  <div id="fp-container" title="tap to retry">
    <svg id="fp-svg" xmlns="http://www.w3.org/2000/svg" fill-rule="evenodd" stroke-linejoin="round" stroke-miterlimit="2" clip-rule="evenodd" viewBox="0 0 64 64">
      <path fill="none" d="M0 0h64v64H0z"/>
      <g id="fp-ridges">
        <path d="M9.741 45.138C14.71 41.935 18 36.352 18 30c0-1.209.153-2.382.441-3.501a2.001 2.001 0 0 0-3.874-.998A18.037 18.037 0 0 0 14 30c0 4.941-2.56 9.285-6.426 11.776a2 2 0 0 0 2.167 3.362zM22.74 19.499A13.948 13.948 0 0 1 32 16c7.732 0 14 6.268 14 14a45.784 45.784 0 0 1-7.83 25.681 2 2 0 0 0 3.316 2.236A49.767 49.767 0 0 0 50 30c0-9.941-8.059-18-18-18-4.565 0-8.733 1.7-11.907 4.501a2 2 0 0 0 2.647 2.998z"/>
        <path d="M7.725 36.35A9.96 9.96 0 0 0 10 30c0-12.103 9.773-21.923 21.857-22a2 2 0 0 0-.025-3.999C17.55 4.091 6 15.697 6 30a5.971 5.971 0 0 1-1.364 3.809 2.002 2.002 0 0 0 .274 2.815 2.001 2.001 0 0 0 2.815-.274zM39.334 9.251C47.878 12.271 54 20.421 54 30a53.99 53.99 0 0 1-2.422 16.041 2 2 0 0 0 3.82 1.186A57.96 57.96 0 0 0 58 30c0-11.321-7.235-20.951-17.334-24.52a2 2 0 0 0-1.332 3.771zM30 30c0 3.978-.774 7.776-2.18 11.25a2 2 0 0 0 3.708 1.5A33.899 33.899 0 0 0 34 30a2 2 0 0 0-4 0zm-6.587 18.759a30.153 30.153 0 0 1-4.725 4.71 2 2 0 0 0 2.494 3.128 34.174 34.174 0 0 0 5.351-5.335 2.001 2.001 0 0 0-3.12-2.503z"/>
        <path d="M14.361 51.677C21.376 47.02 26 39.05 26 30a6 6 0 0 1 9.968-4.501 2 2 0 0 0 2.647-2.998A9.96 9.96 0 0 0 32 20c-5.523 0-10 4.477-10 10 0 7.659-3.914 14.404-9.851 18.344a2.001 2.001 0 0 0 2.212 3.333zm23.592-19.775c-.468 9.506-4.43 18.094-10.63 24.508a2 2 0 1 0 2.876 2.78c6.853-7.09 11.232-16.583 11.749-27.092a2 2 0 0 0-3.995-.196z"/>
      </g>
    </svg>
    <div id="scan-line-div"></div>
  </div>

  <div id="lock-status">authenticating...</div>
</div>

<div id="toolbar">
  <input id="url-bar" type="text" placeholder="search or enter url..." autocomplete="off" spellcheck="false" />
</div>

<div id="main">
  <div id="sidebar">
    <div id="sidebar-header">
      <span>// SESSIONS</span>
      <button id="pin-btn" title="pin sidebar">
        <!-- hollow pin (unpinned) -->
        <svg id="pin-icon-unpinned" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"/>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
        </svg>
        <!-- filled pin (pinned) -->
        <svg id="pin-icon-pinned" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="17" x2="12" y2="22"/>
          <path d="M5 17h14v-1.76a2 2 0 0 0-1.11-1.79l-1.78-.9A2 2 0 0 1 15 10.76V6h1a2 2 0 0 0 0-4H8a2 2 0 0 0 0 4h1v4.76a2 2 0 0 1-1.11 1.79l-1.78.9A2 2 0 0 0 5 15.24Z"/>
        </svg>
      </button>
    </div>
    <div id="tabs"></div>
    <div id="sidebar-footer">
      <button id="new-tab-btn">+ new_session</button>
    </div>

    <div id="vpn-panel">
      <div id="vpn-header">
        <div id="vpn-dot"></div>
        // VPN &nbsp;<span id="vpn-status-text">OFFLINE</span>
      </div>
      <div id="vpn-countries"><!-- filled by JS --></div>
      <button id="vpn-disconnect-btn">⏻ disconnect</button>
    </div>
  </div>

  <div id="content">
    <div id="edge-trigger"></div>
    <div id="home">
      <div id="home-logo">
        <span>BR0WSR</span><br/>
        ─────────────────<br/>
        <span class="blink">█</span> system ready
      </div>
      <div id="home-prompt">
        <input id="home-input" type="text" placeholder="query..." autocomplete="off" spellcheck="false" />
      </div>
      <div id="home-hint">[ ENTER ] execute &nbsp;&nbsp; [ CMD+T ] new session &nbsp;&nbsp; [ CMD+W ] close</div>
    </div>
    <!-- webview wrappers injected here by JS -->
  </div>
</div>

<script>
  const urlBar    = document.getElementById('url-bar')
  const tabsEl    = document.getElementById('tabs')
  const homeEl    = document.getElementById('home')
  const homeInput = document.getElementById('home-input')
  const contentEl = document.getElementById('content')
  const newTabBtn = document.getElementById('new-tab-btn')

  let activeId = null
  let tabIdCounter = 0
  const tabMeta = {}   // id → { title, url, wvWrap, wv }

  // ── URL helper ──────────────────────────────────────────────
  function toURL(raw) {
    raw = raw.trim()
    if (!raw) return null
    if (/^https?:\/\//i.test(raw)) return raw
    if (/^[a-z0-9-]+(\.[a-z]{2,})+/i.test(raw)) return 'https://' + raw
    return 'https://www.google.com/search?q=' + encodeURIComponent(raw)
  }

  // ── Tab management ───────────────────────────────────────────
  function createTab() {
    const id = ++tabIdCounter

    const wvWrap = document.createElement('div')
    wvWrap.className = 'wv-wrap'
    wvWrap.dataset.tabId = id

    const wv = document.createElement('webview')
    wv.setAttribute('allowpopups', '')
    wvWrap.appendChild(wv)
    contentEl.appendChild(wvWrap)

    wv.addEventListener('page-title-updated', e => {
      if (tabMeta[id]) {
        tabMeta[id].title = e.title
        renderTabs()
      }
    })

    wv.addEventListener('did-navigate', e => {
      if (tabMeta[id]) tabMeta[id].url = e.url
      if (id === activeId) urlBar.value = e.url
    })

    wv.addEventListener('did-navigate-in-page', e => {
      if (!e.isMainFrame) return
      if (tabMeta[id]) tabMeta[id].url = e.url
      if (id === activeId) urlBar.value = e.url
    })

    tabMeta[id] = { title: 'New Tab', url: null, wvWrap, wv }
    return id
  }

  function switchTab(id) {
    activeId = id
    // hide all webview wrappers
    document.querySelectorAll('.wv-wrap').forEach(w => w.classList.remove('active'))
    const meta = tabMeta[id]
    if (!meta) return
    if (meta.url) {
      homeEl.classList.add('hidden')
      meta.wvWrap.classList.add('active')
      urlBar.value = meta.url
    } else {
      homeEl.classList.remove('hidden')
      urlBar.value = ''
      setTimeout(() => homeInput.focus(), 50)
    }
    renderTabs()
  }

  function navigate(raw) {
    const url = toURL(raw)
    if (!url) return
    const meta = tabMeta[activeId]
    if (!meta) return
    meta.url = url
    homeEl.classList.add('hidden')
    meta.wvWrap.classList.add('active')
    urlBar.value = url
    meta.wv.src = url
    renderTabs()
  }

  function closeTab(id) {
    const meta = tabMeta[id]
    if (!meta) return
    meta.wvWrap.remove()
    delete tabMeta[id]

    const remaining = Object.keys(tabMeta).map(Number)
    if (!remaining.length) {
      openNewTab()
    } else {
      switchTab(remaining[remaining.length - 1])
    }
    renderTabs()
  }

  function openNewTab() {
    const id = createTab()
    switchTab(id)
    renderTabs()
  }

  function renderTabs() {
    tabsEl.innerHTML = ''
    Object.entries(tabMeta).forEach(([id, meta]) => {
      id = Number(id)
      const div = document.createElement('div')
      div.className = 'tab' + (id === activeId ? ' active' : '')
      const titleSpan = document.createElement('span')
      titleSpan.className = 'tab-title'
      titleSpan.textContent = meta.title
      const closeSpan = document.createElement('span')
      closeSpan.className = 'tab-close'
      closeSpan.textContent = '[x]'
      div.appendChild(titleSpan)
      div.appendChild(closeSpan)
      div.addEventListener('click', e => {
        if (e.target.classList.contains('tab-close')) return
        switchTab(id)
      })
      div.querySelector('.tab-close').addEventListener('click', e => {
        e.stopPropagation()
        closeTab(id)
      })
      tabsEl.appendChild(div)
    })
  }

  // ── Events ──────────────────────────────────────────────────
  urlBar.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate(urlBar.value)
  })

  homeInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') navigate(homeInput.value)
  })

  newTabBtn.addEventListener('click', () => openNewTab())

  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 't') { openNewTab(); e.preventDefault() }
    if ((e.metaKey || e.ctrlKey) && e.key === 'w') { closeTab(activeId); e.preventDefault() }
    if ((e.metaKey || e.ctrlKey) && e.key === 'l') {
      const input = homeEl.classList.contains('hidden') ? urlBar : homeInput
      input.focus(); input.select(); e.preventDefault()
    }
  })

  // ── Init ─────────────────────────────────────────────────────
  openNewTab()
  setTimeout(() => homeInput.focus(), 100)

  // ── Sidebar pin / hover ──────────────────────────────────────
  const sidebar          = document.getElementById('sidebar')
  const pinBtn           = document.getElementById('pin-btn')
  const mainEl           = document.getElementById('main')

  const EDGE_THRESHOLD = 8  // px from left edge to trigger open

  let pinned        = localStorage.getItem('sidebar-pinned') === 'true'
  let sidebarOpen   = false
  let hoverCloseTimer = null
  let cachedRect    = null

  window.addEventListener('resize', () => { cachedRect = null })

  function openSidebar() {
    if (pinned || sidebarOpen) return
    sidebarOpen = true
    sidebar.classList.add('open')
  }

  function closeSidebar() {
    if (pinned || !sidebarOpen) return
    sidebarOpen = false
    sidebar.classList.remove('open')
  }

  function applyPinState() {
    clearTimeout(hoverCloseTimer)
    sidebar.classList.toggle('unpinned', !pinned)
    pinBtn.classList.toggle('pinned', pinned)
    if (pinned) {
      sidebarOpen = false
      sidebar.classList.remove('open')
    }
  }

  pinBtn.addEventListener('click', () => {
    pinned = !pinned
    localStorage.setItem('sidebar-pinned', pinned)
    applyPinState()
  })

  // mousemove on #main: works on home screen (no webview)
  mainEl.addEventListener('mousemove', e => {
    if (pinned) return
    if (!cachedRect) cachedRect = mainEl.getBoundingClientRect()
    if (e.clientX - cachedRect.left <= EDGE_THRESHOLD) {
      clearTimeout(hoverCloseTimer)
      openSidebar()
    }
  })

  // edge-trigger strip: catches entry when webview swallows mousemove
  document.getElementById('edge-trigger').addEventListener('mouseenter', () => {
    if (pinned) return
    clearTimeout(hoverCloseTimer)
    openSidebar()
  })

  // close when cursor leaves sidebar
  sidebar.addEventListener('mouseleave', () => {
    if (pinned) return
    clearTimeout(hoverCloseTimer)
    hoverCloseTimer = setTimeout(closeSidebar, 150)
  })

  // cancel close if cursor re-enters before timer fires
  sidebar.addEventListener('mouseenter', () => {
    clearTimeout(hoverCloseTimer)
  })

  applyPinState()

  // ── VPN ──────────────────────────────────────────────────────
  const vpnDot        = document.getElementById('vpn-dot')
  const vpnStatusText = document.getElementById('vpn-status-text')
  const vpnCountriesEl= document.getElementById('vpn-countries')
  const vpnDisconnBtn = document.getElementById('vpn-disconnect-btn')

  let vpnActiveCode = localStorage.getItem('vpn-country') || null
  let vpnConnected  = false

  async function vpnInit() {
    const countries = await window.browser.vpn.countries()
    vpnCountriesEl.innerHTML = ''
    for (const c of countries) {
      const div = document.createElement('div')
      div.className = 'vpn-country'
      div.dataset.code = c.code
      div.innerHTML = `
        <span class="vpn-flag">${c.flag}</span>
        <span class="vpn-name">${c.name}</span>
        <span class="vpn-indicator">○</span>
      `
      div.addEventListener('click', () => vpnSelectCountry(c.code))
      vpnCountriesEl.appendChild(div)
    }
    vpnPollStatus()
  }

  async function vpnSelectCountry(code) {
    vpnActiveCode = code
    localStorage.setItem('vpn-country', code)
    vpnRenderCountries()
    vpnStatusText.textContent = 'CONNECTING'
    await window.browser.vpn.connect(code)
    setTimeout(vpnPollStatus, 1500)
  }

  async function vpnPollStatus() {
    const status = await window.browser.vpn.status()
    vpnConnected = status === 'Connected'
    const connecting = status === 'Connecting'

    vpnDot.className = vpnConnected ? 'connected' : connecting ? 'connecting' : ''
    vpnStatusText.className = vpnConnected ? 'connected' : ''
    vpnStatusText.textContent = vpnConnected ? 'SECURE' : connecting ? 'CONNECTING' : 'OFFLINE'
    vpnDisconnBtn.className = (vpnConnected || connecting) ? 'visible' : ''
    vpnRenderCountries()
  }

  function vpnRenderCountries() {
    vpnCountriesEl.querySelectorAll('.vpn-country').forEach(el => {
      const isActive = vpnConnected && el.dataset.code === vpnActiveCode
      el.classList.toggle('active', isActive)
      el.querySelector('.vpn-indicator').textContent = isActive ? '●' : '○'
    })
  }

  vpnDisconnBtn.addEventListener('click', async () => {
    await window.browser.vpn.disconnect()
    vpnActiveCode = null
    localStorage.removeItem('vpn-country')
    setTimeout(vpnPollStatus, 800)
  })

  vpnInit()
  setInterval(vpnPollStatus, 4000)

  // ── LOCK SCREEN ──────────────────────────────────────────────
  const lockScreen   = document.getElementById('lock-screen')
  const fpContainer  = document.getElementById('fp-container')
  const lockStatus   = document.getElementById('lock-status')
  let fpBusy = false

  function unlockBrowser() {
    lockScreen.classList.add('hidden')
    setTimeout(() => { lockScreen.style.display = 'none'; homeInput.focus() }, 420)
  }

  async function attemptFingerprint() {
    if (fpBusy) return
    fpBusy = true
    fpContainer.className = 'scanning'
    lockStatus.className = ''
    lockStatus.textContent = 'place your finger...'

    const result = await window.browser.auth.fingerprint()
    fpBusy = false

    if (result.success) {
      fpContainer.className = 'success'
      lockStatus.className = 'ok'
      lockStatus.textContent = '✓ authenticated'
      setTimeout(unlockBrowser, 550)
    } else {
      fpContainer.className = 'error'
      lockStatus.className = 'error'
      lockStatus.textContent = '✗ failed — tap to retry'
      setTimeout(() => {
        fpContainer.className = ''
        lockStatus.className = ''
        lockStatus.textContent = 'tap to retry'
      }, 1600)
    }
  }

  // tap fingerprint to retry
  fpContainer.addEventListener('click', attemptFingerprint)

  // auto-trigger on load
  window.browser.auth.check().then(available => {
    if (available) {
      setTimeout(attemptFingerprint, 300)
    } else {
      fpContainer.className = 'error'
      lockStatus.textContent = 'touch id not available on this device'
    }
  })
</script>
</body>
</html>
